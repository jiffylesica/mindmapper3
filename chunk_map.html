        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"font": {"color": "white"}, "group": "Cluster 2", "id": 0, "label": 0, "shape": "dot", "title": "In his 2022 lecture, *The Limits of the Quantitative Approach to Discrimination*, Arvind Narayanan puts forth a provocative claim on the role of quantitative methods in the contemporary age: \u201ccurrentl"}, {"font": {"color": "white"}, "group": "Cluster 0", "id": 1, "label": 1, "shape": "dot", "title": "I would argue that they do more harm than good\u201d [@narayanan2022limits]."}, {"font": {"color": "white"}, "group": "Cluster 0", "id": 2, "label": 2, "shape": "dot", "title": "However, this claim can only be fully appreciated in the broader context of his speech, including not only its evidence and subclaims, but also Narayanan\u2019s own positionality."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 3, "label": 3, "shape": "dot", "title": "As Narayanan explains in his speech, the harmful effects of Quantitative Methods seen today are not due to any inherent flaw, but instead because we have misunderstood the role and value of numbers in"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 4, "label": 4, "shape": "dot", "title": "As a quantitative scholar himself, Narayanan can provide a distinct level of specificity to this claim \u2013 of insider insight \u2013 which helps illuminate the tangible realities which beg us to take serious"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 5, "label": 5, "shape": "dot", "title": "Narayanan highlights 7 key limitations of quantitative methods which he has observed in his time as a quantitative scientist: Choice of null hypothesis, Use of snapshot datasets, Use of data provided "}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 6, "label": 6, "shape": "dot", "title": "The *objectivity illusion* is the quantitative limitation which, in a way, is at the heart of all other limitations put forth in Narayanan\u2019s essay."}, {"font": {"color": "white"}, "group": "Cluster 0", "id": 7, "label": 7, "shape": "dot", "title": "As such, it is at the heart of the logic which my essay puts forth."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 8, "label": 8, "shape": "dot", "title": "Acknowledging it necessarily entails complications related to snapshot data, explaining away discrimination, and even the performative policies which quantitative science has brought about."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 9, "label": 9, "shape": "dot", "title": "The objectivity illusion refers to the false belief that quantitative research is objective because numbers are objective."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 10, "label": 10, "shape": "dot", "title": "Quantitative research involves subjective decisions made by researchers at multiple steps throughout the process such as \u2013 as mentioned above \u2013 choice of dataset or data collection methods, how to fra"}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 11, "label": 11, "shape": "dot", "title": "The objectivity illusion is also at the heart of the previously mentioned limitations of snapshot data sets."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 12, "label": 12, "shape": "dot", "title": "As D\u2019ignazio and Klein explain, \u201cdata are not neutral or objective."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 13, "label": 13, "shape": "dot", "title": "They are products of unequal social relations, and this context is essential for conducting accurate, ethical analysis\u201d [See Introduction in @d2023data]."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 14, "label": 14, "shape": "dot", "title": "Contemporary theories in the humanities, while not directly engaging questions of the quantitative world, offer language which is helpful to clarify the objectivity illusion."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 15, "label": 15, "shape": "dot", "title": "In his book *Crossing and Dwellings*, for example, Thomas Tweed draws from insights of his scholarship to encourage a dynamic and itinerant approach to religious theory."}, {"font": {"color": "white"}, "group": "Cluster 0", "id": 16, "label": 16, "shape": "dot", "title": "The reason I bring such a seemingly distant resource to this conversation is, well, because it may not be as distant as we think."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 17, "label": 17, "shape": "dot", "title": "In fact, the \"meta-theory\" of theory which Tweed puts forth is quite similar to the \u201cadversarial collaboration\u201d approach of interpreting data which Narayanan mentions as \u201cadmirable\u201d, in that it \u201cexpli"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 18, "label": 18, "shape": "dot", "title": "As Tweed writes, \u201cit is precisely because we stand in a particular place that we are able to see, to know, to narrate\u201d [@Tweed+2008, p. 18]."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 19, "label": 19, "shape": "dot", "title": "There is no independent access to the experiences or subjective states of another, only that which the scholar can \u2018see\u2019 \u2013 used by Tweed to represent the multi-sensory reception of the corporeal world"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 20, "label": 20, "shape": "dot", "title": "And, it is from those sightings that a scholar is able to construct meaning using the \u201ccategories and criteria they inherit, revise, and create\u201d [@Tweed+2008, p. 18]."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 21, "label": 21, "shape": "dot", "title": "In the quantitative world, such sightings are at particular risk of being incomplete not because it is inherently worse, but because it is just simply not possible yet \u2013 whether by nature or by the li"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 22, "label": 22, "shape": "dot", "title": "It is in recognizing this reality that the first steps may be taken towards deconstructing the epistemic hierarchy which grips the quantitative world."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 23, "label": 23, "shape": "dot", "title": "It is ultimately from the objectivity illusion that other limitations emerge."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 24, "label": 24, "shape": "dot", "title": "For example, take the *Choice of null hypothesis*."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 25, "label": 25, "shape": "dot", "title": "Quantitative communities have \u201csettled on the absence of discrimination\u201d as the default assumption."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 26, "label": 26, "shape": "dot", "title": "Choosing to see the world as impartial places the burden of proof on those alleging discrimination, and naively pretends that quantitative scholars \u2013 or really that anyone \u2013 has the capacity to live i"}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 27, "label": 27, "shape": "dot", "title": "Such a choice not only ignores, but may even perpetuate discrimination as it brushes aside the possibility of systemic discrimination \u2013 which manifests in implicit, everyday forms and compound over ti"}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 28, "label": 28, "shape": "dot", "title": "To standardize the absence of discrimination holds a massive normative significance in that it encourages us to be blind to inequality unless it presents itself clearly and \u2018objectively\u2019, and even the"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 29, "label": 29, "shape": "dot", "title": "Narayanan\u2019s observations about the choice and the null hypothesis point us to consider the principles upon which we build quantitative methods, and particularly how quantitative methods and researcher"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 30, "label": 30, "shape": "dot", "title": "Quantitative scholars who follow the framework of Data Feminism, for example, would argue that such considerations should manifest in challenges to unequal power structures and working toward justice "}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 31, "label": 31, "shape": "dot", "title": "However, even before such a principle can be acted on, scholars must first take seriously the existence of power structures, and the ways in which the data they evaluate grows within, exists in relati"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 32, "label": 32, "shape": "dot", "title": "Furthermore, most datasets upon which quantitative methods are employed are collected from a \u201csingle system at a single point in time,\u201d and it is even rarer for people to go out and collect new data."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 33, "label": 33, "shape": "dot", "title": "Such *snapshot datasets* are thus only frames in a much larger picture which inevitably involves systemic, social, and structural trends, \u201cforcing the researcher to ignore people\u2019s broader circumstanc"}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 34, "label": 34, "shape": "dot", "title": "If we assume that such data can provide sufficient view of discrimination, or a lack thereof, we are encouraged to believe discrimination happens in snapshots \u2013 in \u201cdiscrete moments of time\u201d and quant"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 35, "label": 35, "shape": "dot", "title": "Other quantitative scholars affirm this limitation, such as D\u2019ignazio and Klein who argue that \u201cthe process of converting life experience into data always necessarily entails a reduction of that exper"}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 36, "label": 36, "shape": "dot", "title": "It is these misapprehensions which ultimately lead to Explaining away discrimination."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 37, "label": 37, "shape": "dot", "title": "In evaluating statistical disparities, quantitative researchers often diminish/set aside evidence of discrimination through their choice of analytical variables."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 38, "label": 38, "shape": "dot", "title": "Specifically, in trying to make their research logically/interpretatively sound, they control for variables that are tied to social constructs like race, subsequently excluding many of the proximal wa"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 39, "label": 39, "shape": "dot", "title": "For example, Narayanan cites the 2004 study by Bertrand and Mullainathan which sent fake resumes to employers to test if an applicant\u2019s race had an impact on the likelihood of them getting an intervie"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 40, "label": 40, "shape": "dot", "title": "The way they implemented this was by creating pairs of resumes which were identical except for the applicant\u2019s name, which would either be \u201cWhite-sounding\u201d (Emily, Greg, etc.)"}, {"font": {"color": "white"}, "group": "Cluster 0", "id": 41, "label": 41, "shape": "dot", "title": "or \u201cBlack-sounding\u201d (Lakisha, Jamal, etc.)"}, {"font": {"color": "white"}, "group": "Cluster 0", "id": 42, "label": 42, "shape": "dot", "title": "[@narayanan2022limits]."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 43, "label": 43, "shape": "dot", "title": "While the study did find that \u201cWhite names\u201d were 50% more likely to receive a callback, it also limits our understanding of what data may signal someone\u2019s social identity to their name: \u201cLiterally eve"}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 44, "label": 44, "shape": "dot", "title": "Thus, while the study may have revealed discrimination in practice, it may have also \u201cdrastically underestimated\u201d the degree of discrimination found in hiring practices [@narayanan2022limits]."}, {"font": {"color": "white"}, "group": "Cluster 0", "id": 45, "label": 45, "shape": "dot", "title": "A 2016 paper by Mittelstadt et al."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 46, "label": 46, "shape": "dot", "title": "further highlights this limitation, asserting that \u201cthe outputs of algorithms also require interpretation.\u201d As such, \u2018objective\u2019 correlations can come to reflect the interpreter\u2019s \u201cunconscious motivat"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 47, "label": 47, "shape": "dot", "title": "This point is reiterated in *Fairness and Machine Learning*, in which Barocas, Hardt, and Narayanan himself discuss the complexities which come with building fair machine learning models."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 48, "label": 48, "shape": "dot", "title": "If systematic discrimination persists in the world through subtle and systemic channels, it can\u2019t be wholly identified in data that excludes those channels: \u201cIn real datasets, most attributes tend to "}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 49, "label": 49, "shape": "dot", "title": "However, while on one hand arguing about the present harms of quantitative methods, it would be insufficient to characterize Narayanan\u2019s lecture as an expos\u00e9."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 50, "label": 50, "shape": "dot", "title": "He isn\u2019t just saying what is wrong with this system, but rather presents a call to action and reformed thinking about the quantitative world."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 51, "label": 51, "shape": "dot", "title": "Eliminating quantitative methods from the conversation is neither desirable nor attainable, for the limitations which are found today are \u201cnot inherent to quantitative work\u201d [@narayanan2022limits]."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 52, "label": 52, "shape": "dot", "title": "A better way of engaging with the quantitative world is possible, and steps made toward it can be seen today."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 53, "label": 53, "shape": "dot", "title": "On the surface, the proposition of taking seriously the subjectivity of human experience \u2013 of both the researcher and the researched \u2013 is not technically sophisticated enough."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 54, "label": 54, "shape": "dot", "title": "On the surface, the idea of developing research methods to measure and interpret systemic forms of discrimination \u2013 methods which \u201cdig deeper\u201d into the assumptions and politics which inevitably shape "}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 55, "label": 55, "shape": "dot", "title": "However, it is only once we realize that the epistemic role of quantitative methods in a human world can never be absolute, because it is one of many ways of knowing the world, that we may begin to sh"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 56, "label": 56, "shape": "dot", "title": "The 2019 study conducted by Obermeyer et al., *Dissecting racial bias in an algorithm used to manage the health of populations*, provides a critical example of this digging deeper, and how quantitativ"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 57, "label": 57, "shape": "dot", "title": "In this research, the authors examined a commercially deployed prediction algorithm intended to identify patients who could benefit from extra medical support, known as \"high-risk care management\" pro"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 58, "label": 58, "shape": "dot", "title": "By exploring the data produced from one of these algorithms through quantitative methods, Obermeyer and colleagues revealed that the algorithm systematically underestimated the healthcare needs of Bla"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 59, "label": 59, "shape": "dot", "title": "Specifically, they found that Black patients who had identical algorithmic risk scores - i.e."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 60, "label": 60, "shape": "dot", "title": "who were considered of equally high medical risk/eligible for HRCMP as their white counterparts - were considerably sicker on average."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 61, "label": 61, "shape": "dot", "title": "Specifically, they found that Black patients who were predicted as \u201cvery-high-risk\u201d (at the point of being auto-identified from HRCMP enrollment) had 26% more chronic health conditions when compared t"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 62, "label": 62, "shape": "dot", "title": "After further searching, the authors identified that the algorithm predicts health care costs rather than illness, targeting patients with high costs as eligible for HRCMPs."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 63, "label": 63, "shape": "dot", "title": "However, in doing so the algorithm mistakenly equated lower healthcare expenditures by Black patients with lower healthcare needs, overlooking the structural inequalities that produce disparate costs "}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 64, "label": 64, "shape": "dot", "title": "While Black patients may spend less on healthcare than white patients, it is not because they are less sick."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 65, "label": 65, "shape": "dot", "title": "Instead, the authors identified that such a disparity arises from \u201cunequal access to care\u201d which has been driven by historical relationships \u2013 such as Black patients having reduced trust in the doctor"}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 66, "label": 66, "shape": "dot", "title": "If these patients are cared for less often, then they will ultimately spend less on health care, contributing to the predictive biases which the study identified."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 67, "label": 67, "shape": "dot", "title": "This study provides an insightful application of the notion of calibration as detailed in *Fairness and Machine Learning*."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 68, "label": 68, "shape": "dot", "title": "Calibration, a quantitative fairness criterion, requires that risk scores accurately reflect outcomes equivalently across different demographic groups (Barocas et al."}, {"font": {"color": "white"}, "group": "Cluster 0", "id": 69, "label": 69, "shape": "dot", "title": "61-62)."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 70, "label": 70, "shape": "dot", "title": "In the context of this study, a calibrated model ensures that, conditional on risk score, \u201cpredictions do not favor Whites or Blacks anywhere in the risk distribution\u201d [@obermeyer2019dissecting]."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 71, "label": 71, "shape": "dot", "title": "Technically, the healthcare algorithm satisfied this calibration criterion when assigning risk scores based on healthcare expenditure."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 72, "label": 72, "shape": "dot", "title": "However, the study illuminated a crucial limitation: calibration alone does not account for systemic biases embedded within the outcomes themselves - in this case, healthcare costs rather than actual "}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 73, "label": 73, "shape": "dot", "title": "While calibration seeks to produce proportional consistency, it can perpetuate deep-rooted inequities if the target outcome itself is unjustly biased."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 74, "label": 74, "shape": "dot", "title": "Relying on proxies like healthcare spending is problematic as it disproportionately reflects unequal access and historical discrimination rather than genuine patient health needs."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 75, "label": 75, "shape": "dot", "title": "In other words, even a technically fair model - one that accurately predicts on healthcare expenditures - can remain unjust if it systematically disadvantages groups facing structural inequality."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 76, "label": 76, "shape": "dot", "title": "This study highlights the benefits of employing *epistemically humble* (to stay in line with Narayanan\u2019s language) quantitative methods in analyses of discrimination."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 77, "label": 77, "shape": "dot", "title": "The authors\u0027 evaluation allows them to reveal how a seemingly neutral algorithm actually perpetuated discrimination."}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 78, "label": 78, "shape": "dot", "title": "By quantifying the precise and various extents of disparity, the researchers make the reality of discrimination tangible, clear, and actionable."}, {"font": {"color": "white"}, "group": "Cluster 3", "id": 79, "label": 79, "shape": "dot", "title": "Subsequently, their analysis guides readers through possible interventions \u2013 such as reformulating the algorithm itself, or changing the data it is ultimately fed \u2013 that could substantially mitigate r"}, {"font": {"color": "white"}, "group": "Cluster 1", "id": 80, "label": 80, "shape": "dot", "title": "Therefore, Obermeyer et al\u2019s study not only underscores the value of quantitative methods in exposing hidden biases, but also emphasizes the need to critically evaluate and choose fairness criteria th"}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 81, "label": 81, "shape": "dot", "title": "Narayanan\u2019s critique is not an outright dismissal of quantitative methods but rather a call to critically examine the assumptions and limitations that shape their applications."}, {"font": {"color": "white"}, "group": "Cluster 2", "id": 82, "label": 82, "shape": "dot", "title": "My analysis of Narayanan\u2019s claim, contextualized through his concept of the *objectivity illusion*, has shown that the limitations he identifies are not inherent to quantitative methods, but arise fro"}]);
                  edges = new vis.DataSet([]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "repulsion": {
            "centralGravity": 0.1,
            "damping": 0.9,
            "nodeDistance": 300,
            "springConstant": 0.05,
            "springLength": 150
        },
        "solver": "repulsion",
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
