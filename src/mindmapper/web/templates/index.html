{% extends "layout.html" %}

{% block title %}Upload | MindMapper{% endblock %}

{% block content %}
  <section class="upload">
    <h2>Upload a text or PDF file</h2>
    <form method="post" enctype="multipart/form-data">
      <fieldset>
        <legend>File Selection</legend>
        <label for="file">Choose .txt or .pdf file</label>
        <input type="file" id="file" name="file" accept=".txt,.pdf" required>
      </fieldset>

      <fieldset>
        <legend>Chunking Strategy</legend>
        
        <div class="strategy-option">
          <label>
            <input type="radio" name="chunking_strategy" value="fixed" checked onchange="toggleChunkingOptions()">
            <strong>Fixed-Length Chunking</strong> - Split text into fixed-size chunks by sentence count
          </label>
          <div id="fixed-options" class="strategy-params">
            <label for="sent_per_chunk">Sentences per chunk:</label>
            <input type="number" id="sent_per_chunk" name="sent_per_chunk" value="4" min="1" max="20">
          </div>
        </div>

        <div class="strategy-option">
          <label>
            <input type="radio" name="chunking_strategy" value="hierarchical" onchange="toggleChunkingOptions()">
            <strong>Hierarchical Chunking</strong> - Respect paragraph boundaries, merge small paragraphs
          </label>
          <div id="hierarchical-options" class="strategy-params" style="display:none;">
            <label for="max_chunk_size">Maximum sentences per chunk:</label>
            <input type="number" id="max_chunk_size" name="max_chunk_size" value="10" min="1" max="10">
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Clustering</legend>
        <label for="num_clusters">Number of clusters:</label>
        <input type="number" id="num_clusters" name="num_clusters" value="3" min="2" max="5">
        <small>Choose between 2 and 5 clusters (default is 3).</small>
      </fieldset>

      <button type="submit">Run pipeline</button>
    </form>
  </section>

  <script>
    function toggleChunkingOptions() {
      const strategy = document.querySelector('input[name="chunking_strategy"]:checked').value;
      const fixedDiv = document.getElementById('fixed-options');
      const hierarchicalDiv = document.getElementById('hierarchical-options');
      
      if (strategy === 'fixed') {
        fixedDiv.style.display = 'block';
        hierarchicalDiv.style.display = 'none';
      } else {
        fixedDiv.style.display = 'none';
        hierarchicalDiv.style.display = 'block';
      }
    }
  </script>

  <style>
    fieldset {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    legend {
      font-weight: bold;
      padding: 0 10px;
    }

    .strategy-option {
      margin: 15px 0;
    }

    .strategy-params {
      margin-left: 30px;
      margin-top: 10px;
      padding: 10px;
      background-color: #f5f5f5;
      border-left: 3px solid #007bff;
    }

    .strategy-params label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .strategy-params input[type="number"] {
      width: 100px;
      padding: 5px;
      font-size: 14px;
    }
  </style>
{% endblock %}
