{% extends "layout.html" %}

{% block title %}Result | MindMapper{% endblock %}

{% block content %}
  <section class="result">
    <h2>Generated Graph</h2>
    <p class="meta">Graph file: {{ graph_url.split('/')[-1] }}</p>
    <iframe src="{{ graph_url }}" width="100%" height="800" class="graph-frame"></iframe>
    <p><a href="{{ url_for('index') }}">Upload another file</a></p>
  </section>
{% endblock %}
